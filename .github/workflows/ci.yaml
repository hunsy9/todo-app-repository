name: CI - Build and Push to ECR

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY/todo-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/todo-backend:$IMAGE_TAG
          docker build -t $ECR_REGISTRY/todo-frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/todo-frontend:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update manifest repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MANIFEST_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = 'todo-manifest-repository';
            const path = 'deployment.yaml';
            const imageTag = '${{ env.IMAGE_TAG }}';
            const registry = '${{ env.ECR_REGISTRY }}';

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            let content = Buffer.from(file.content, 'base64').toString();
            // frontend 컨테이너의 image 라인 치환 (플레이스홀더 또는 기존 ECR 주소)
            content = content.replace(
              /( +- name: frontend\n[\s\S]*?image: ).+/m,
              `$1${registry}/todo-frontend:${imageTag}`
            );
            // backend 컨테이너의 image 라인 치환
            content = content.replace(
              /( +- name: backend\n[\s\S]*?image: ).+/m,
              `$1${registry}/todo-backend:${imageTag}`
            );
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `chore: update images to ${imageTag}`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            });
