name: CI - Build and Push to ECR

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  INGRESS_SECURITY_GROUP: ${{ vars.INGRESS_SECURITY_GROUP }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          docker build -t $ECR_REGISTRY:$IMAGE_TAG .
          docker push $ECR_REGISTRY:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update manifest - deployment.yaml
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MANIFEST_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = 'todo-manifest-repository';
            const path = 'deployment.yaml';
            const imageTag = '${{ env.IMAGE_TAG }}';
            const registry = '${{ env.ECR_REGISTRY }}';

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            let content = Buffer.from(file.content, 'base64').toString();
            content = content.replace(
              /( +- name: todo-app\n[\s\S]*?image: ).+/m,
              `$1${registry}:${imageTag}`
            );
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `chore: update image to ${imageTag}`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            });

      - name: Update manifest - ingress.yaml
        if: env.INGRESS_SECURITY_GROUP != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MANIFEST_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = 'todo-manifest-repository';
            const path = 'ingress.yaml';
            const sg = '${{ env.INGRESS_SECURITY_GROUP }}';

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            let content = Buffer.from(file.content, 'base64').toString();

            if (content.includes('alb.ingress.kubernetes.io/security-groups')) {
              content = content.replace(
                /alb\.ingress\.kubernetes\.io\/security-groups: .+/,
                `alb.ingress.kubernetes.io/security-groups: ${sg}`
              );
            } else {
              content = content.replace(
                /alb\.ingress\.kubernetes\.io\/target-type: ip/,
                `alb.ingress.kubernetes.io/target-type: ip\n    alb.ingress.kubernetes.io/security-groups: ${sg}`
              );
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `chore: update ingress security group`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            });
